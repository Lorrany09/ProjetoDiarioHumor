<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/diario.css">
    <title>Diário do Humor</title>
</head>
<body>
    <header>
        <h1>Diário do Humor</h1>
        <button id="voltar" onclick="sairPagina()">Voltar</button>
    </header>
    <main>
        <h2 id="boasVindas"></h2>
        
        <h2 id="subtitulo">Como você está hoje?</h2>
        
        <div id="emojis"></div>
        <div id="erro"></div>
        
        <div class="input">
            <label for="motivo">Motivo:</label>
            <textarea name="input" id="motivo"></textarea>
        </div>
        <button id="salvarHumor" onclick="salvarHumor()">Salvar</button>
        
        <div class="historico">
            <h2>Histórico da Semana:</h2>
            <div id="historico"></div>
        </div>

        <div class="historico">
            <h2>Humor da Semana:</h2>
            <div id="historicoHumor"></div>
        </div>
    </main>
    <footer>
        <p>Todos os direitos reservados para <a href="https://github.com/Lorrany09" target="_blank" rel="noopener noreferrer">@Lorrany</a></p>
    </footer>

    <script src="/js/fazerEmoji.js"></script>
    <script src="/js/salvarMensagem.js"></script>
    <script src="/js/verificações.js"></script>
</body>
</html>
